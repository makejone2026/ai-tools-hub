<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>免费文档转Markdown | 本地处理 数据安全</title>
<meta name="description" content="免费在线文档转换工具。支持Word/PDF/TXT转Markdown，纯本地处理，数据绝不上传。">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);color:#e2e8f0;min-height:100vh}
.container{max-width:800px;margin:0 auto;padding:40px 20px}
header{text-align:center;margin-bottom:32px}
header h1{font-size:2.2rem}
header h1 span{background:linear-gradient(135deg,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header .sub{color:#94a3b8;font-size:1.05rem;margin-top:8px}
.card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:32px;margin-bottom:24px}
.upload-zone{border:2px dashed #475569;border-radius:16px;padding:48px 24px;text-align:center;cursor:pointer;transition:all .3s;margin-bottom:20px}
.upload-zone:hover,.upload-zone.drag{border-color:#a78bfa;background:rgba(167,139,250,.05)}
.upload-zone .icon{font-size:3rem;margin-bottom:12px}
.upload-zone .text{font-size:1.1rem;color:#cbd5e1}
.upload-zone .hint{color:#64748b;font-size:.85rem;margin-top:8px}
.file-list{margin-bottom:20px}
.file-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#0f172a;border-radius:10px;margin-bottom:6px}
.file-item .name{font-size:.9rem;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-item .size{color:#64748b;font-size:.8rem;margin:0 12px;white-space:nowrap}
.file-item .status{font-size:.8rem;font-weight:600}
.status.ok{color:#4ade80}
.status.err{color:#f87171}
.status.proc{color:#fbbf24}
.result-box{margin-top:20px}
.result-box textarea{width:100%;min-height:300px;background:#0f172a;border:1px solid #334155;border-radius:10px;padding:16px;color:#e2e8f0;font-family:'JetBrains Mono',monospace;font-size:.85rem;resize:vertical}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:10px;border:none;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,#a78bfa,#f472b6);color:#fff}
.btn-secondary{background:#334155;color:#e2e8f0}
.btn:hover{transform:translateY(-1px)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.cta-box{text-align:center}
.cta-box h3{font-size:1.2rem;margin-bottom:8px}
.cta-box p{color:#94a3b8;margin-bottom:20px}
.cta-box form{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.cta-box input[type=email]{padding:14px 18px;border-radius:10px;border:1px solid #475569;background:#0f172a;color:#e2e8f0;font-size:1rem;flex:1;min-width:220px}
.cta-box button{padding:14px 28px;border-radius:10px;border:none;background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;font-weight:600;font-size:1rem;cursor:pointer;white-space:nowrap}
.trust{color:#64748b;font-size:.8rem;margin-top:12px}
.stats{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-bottom:32px}
.stat{text-align:center;padding:12px 24px;background:#1e293b;border-radius:12px;border:1px solid #334155}
.stat .num{font-size:1.5rem;font-weight:700;color:#a78bfa}
.stat .lbl{color:#94a3b8;font-size:.8rem}
footer{text-align:center;color:#475569;font-size:.8rem;margin-top:40px;padding-top:20px;border-top:1px solid #1e293b}
input[type=file]{display:none}
</style>
</head>
<body>
<div class="container">
<header>
  <h1>📄 免费<span>文档转Markdown</span></h1>
  <p class="sub">Word / PDF / TXT → Markdown · 纯本地处理 · 数据绝不上传</p>
</header>

<div class="stats">
  <div class="stat"><div class="num" id="fileCount">0</div><div class="lbl">支持格式</div></div>
  <div class="stat"><div class="num" id="bytesCount">0 MB</div><div class="lbl">已处理</div></div>
  <div class="stat"><div class="num">100%</div><div class="lbl">本地处理</div></div>
</div>

<div class="card">
  <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
    <div class="icon">📁</div>
    <div class="text">拖拽文件到此处，或点击上传</div>
    <div class="hint">支持 .docx .pdf .txt · 单文件最大 50MB</div>
  </div>
  <input type="file" id="fileInput" accept=".docx,.pdf,.txt,.md" onchange="handleFiles(this.files)">
  
  <div class="file-list" id="fileList"></div>
  
  <div class="result-box" id="resultBox" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-weight:600">📝 转换结果</span>
      <span style="color:#64748b;font-size:.8rem" id="charCount">0 字符</span>
    </div>
    <textarea id="resultText" readonly placeholder="转换后的Markdown内容..."></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="copyResult()">📋 复制全部</button>
      <button class="btn btn-secondary" onclick="downloadResult()">💾 下载 .md</button>
    </div>
  </div>
</div>

<div class="card cta-box" id="ctaSection">
  <h3>💼 需要批量处理？</h3>
  <p>每天处理上百个文档？留下邮箱，获取企业级批量转换方案（支持OCR/表格/图片）</p>
  <form action="https://formsubmit.co/28960559@qq.com" method="POST">
    <input type="hidden" name="_subject" value="Markitdown批量转换需求">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_template" value="table">
    <input type="email" name="email" placeholder="your@email.com" required>
    <button type="submit">获取方案 →</button>
  </form>
  <p class="trust">🔒 不发送垃圾邮件 · 随时退订</p>
</div>

<footer>数据100%本地浏览器处理 · 绝不上传服务器 · 开源可审计</footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.8.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let totalBytes = 0;
let allResults = [];

// Drag & drop
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag');
  handleFiles(e.dataTransfer.files);
});

async function handleFiles(files) {
  if (!files.length) return;
  const fileList = document.getElementById('fileList');
  
  for (let file of files) {
    if (file.size > 50 * 1024 * 1024) {
      addFileItem(file.name, file.size, 'err', '文件过大 (>50MB)');
      continue;
    }
    
    const itemId = 'file-' + Date.now() + '-' + Math.random().toString(36).slice(2);
    addFileItem(file.name, file.size, 'proc', '转换中...', itemId);
    
    try {
      let text = '';
      const ext = file.name.split('.').pop().toLowerCase();
      
      if (ext === 'txt' || ext === 'md') {
        text = await file.text();
      } else if (ext === 'docx') {
        const arrayBuffer = await file.arrayBuffer();
        const result = await mammoth.convertToMarkdown({arrayBuffer});
        text = result.value;
      } else if (ext === 'pdf') {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
        const pages = [];
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          pages.push(content.items.map(item => item.str).join(' '));
        }
        text = pages.join('\n\n---\n\n');
      } else {
        throw new Error('不支持的文件格式');
      }
      
      totalBytes += file.size;
      allResults.push({name: file.name, text});
      updateFileItem(itemId, 'ok', `${(text.length/1000).toFixed(1)}K 字符`);
      updateStats();
      showResults();
    } catch(err) {
      updateFileItem(itemId, 'err', err.message);
    }
  }
}

function addFileItem(name, size, type, msg, id) {
  const div = document.createElement('div');
  div.className = 'file-item';
  div.id = id || '';
  div.innerHTML = `
    <span class="name">📄 ${name}</span>
    <span class="size">${(size/1024).toFixed(1)} KB</span>
    <span class="status ${type==='ok'?'ok':type==='err'?'err':'proc'}">${msg}</span>
  `;
  document.getElementById('fileList').appendChild(div);
}

function updateFileItem(id, type, msg) {
  const el = document.getElementById(id);
  if (!el) return;
  const status = el.querySelector('.status');
  status.textContent = msg;
  status.className = `status ${type==='ok'?'ok':type==='err'?'err':'proc'}`;
}

function updateStats() {
  document.getElementById('fileCount').textContent = allResults.length;
  document.getElementById('bytesCount').textContent = (totalBytes/(1024*1024)).toFixed(1) + ' MB';
}

function showResults() {
  if (!allResults.length) return;
  const box = document.getElementById('resultBox');
  const textarea = document.getElementById('resultText');
  const combined = allResults.map(r => `# ${r.name}\n\n${r.text}\n\n---\n`).join('\n');
  textarea.value = combined;
  document.getElementById('charCount').textContent = combined.length.toLocaleString() + ' 字符';
  box.style.display = 'block';
  document.getElementById('ctaSection').style.display = 'block';
}

function copyResult() {
  const textarea = document.getElementById('resultText');
  textarea.select();
  document.execCommand('copy');
  alert('✅ 已复制到剪贴板！');
}

function downloadResult() {
  const text = document.getElementById('resultText').value;
  const blob = new Blob([text], {type: 'text/markdown'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'converted.md';
  a.click();
  URL.revokeObjectURL(url);
}
</script>
