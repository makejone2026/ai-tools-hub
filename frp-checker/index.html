<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>内网穿透检测 | 你的服务能被外网访问吗？</title>
<meta name="description" content="免费检测你的网络环境是否支持外网访问。一键获取公网IP、NAT类型、端口可达性，推荐最佳内网穿透方案。">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);color:#e2e8f0;min-height:100vh}
.container{max-width:680px;margin:0 auto;padding:40px 20px}
header{text-align:center;margin-bottom:32px}
header h1{font-size:2.2rem}
header h1 span{background:linear-gradient(135deg,#34d399,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header .sub{color:#94a3b8;font-size:1.05rem;margin-top:8px}
.card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:32px;margin-bottom:24px}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:20px 0}
.result-item{background:#0f172a;border-radius:12px;padding:20px}
.result-item .label{color:#64748b;font-size:.8rem;margin-bottom:6px}
.result-item .value{font-size:1.3rem;font-weight:700;word-break:break-all}
.result-item .value.ok{color:#4ade80}
.result-item .value.warn{color:#fbbf24}
.result-item .value.bad{color:#f87171}
.verdict{text-align:center;padding:24px;background:linear-gradient(135deg,#064e3b,#0f172a);border-radius:12px;margin:20px 0}
.verdict .icon{font-size:3rem;margin-bottom:8px}
.verdict .text{font-size:1.2rem;font-weight:700}
.verdict .detail{color:#94a3b8;font-size:.9rem;margin-top:6px}
.solution{background:#0f172a;border-radius:12px;padding:20px;margin-top:16px}
.solution h4{margin-bottom:12px;color:#34d399}
.solution .step{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px}
.solution .step-num{background:#065f46;color:#34d399;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0;margin-top:1px}
.solution .step-text{font-size:.9rem;line-height:1.5}
.btn{display:inline-flex;align-items:center;gap:6px;padding:14px 32px;background:linear-gradient(135deg,#34d399,#06b6d4);color:#fff;border:none;border-radius:10px;font-size:1.05rem;font-weight:600;cursor:pointer;width:100%;justify-content:center;transition:all .2s}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(52,211,153,.3)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.cta-box{text-align:center}
.cta-box h3{font-size:1.2rem;margin-bottom:8px}
.cta-box p{color:#94a3b8;margin-bottom:20px}
.cta-box form{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.cta-box input[type=email]{padding:14px 18px;border-radius:10px;border:1px solid #475569;background:#0f172a;color:#e2e8f0;font-size:1rem;flex:1;min-width:220px}
.cta-box button{padding:14px 28px;border-radius:10px;border:none;background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;font-weight:600;font-size:1rem;cursor:pointer;white-space:nowrap}
.trust{color:#64748b;font-size:.8rem;margin-top:12px}
footer{text-align:center;color:#475569;font-size:.8rem;margin-top:40px;padding-top:20px;border-top:1px solid #1e293b}
</style>
</head>
<body>
<div class="container">
<header>
  <h1>🌐 你的服务能被<span>外网访问</span>吗？</h1>
  <p class="sub">一键检测公网IP、NAT类型、端口可达性 → 推荐最佳穿透方案</p>
</header>

<div class="card">
  <button class="btn" id="scanBtn" onclick="runScan()">🔍 开始检测</button>
  <div id="results" style="display:none"></div>
</div>

<div class="card cta-box" id="ctaSection" style="display:none">
  <h3>🔧 需要专业内网穿透配置？</h3>
  <p>frp一键部署 + 安全加固 + HTTPS证书。留下邮箱，获取定制方案</p>
  <form action="https://formsubmit.co/28960559@qq.com" method="POST">
    <input type="hidden" name="_subject" value="FRP内网穿透部署需求">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_template" value="table">
    <input type="email" name="email" placeholder="your@email.com" required>
    <button type="submit">获取方案 →</button>
  </form>
  <p class="trust">🔒 不发送垃圾邮件 · 随时退订</p>
</div>

<footer>检测数据仅用于本次分析 · 不上传服务器 · 开源可审计</footer>
</div>

<script>
async function runScan() {
  const btn = document.getElementById('scanBtn');
  btn.disabled = true;
  btn.innerHTML = '⏳ 检测中...';

  // 1. Get public IP
  let publicIP = '未知', isp = '', natType = '未知', canExpose = false;
  try {
    const resp = await fetch('https://api.ipify.org?format=json');
    const data = await resp.json();
    publicIP = data.ip;
  } catch(e) { publicIP = '无法获取'; }

  // 2. Detect NAT type via WebRTC
  let localIPs = [];
  try {
    const pc = new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
    pc.createDataChannel('');
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    const candidates = await new Promise((resolve) => {
      const cands = [];
      pc.onicecandidate = e => { if (e.candidate) cands.push(e.candidate); else resolve(cands); };
    });
    for (let c of candidates) {
      const addr = c.address || c.candidate?.split(' ')[4];
      if (addr && !addr.includes(':') && addr !== '0.0.0.0') localIPs.push(addr);
    }
    pc.close();
  } catch(e) {}

  // 3. NAT type heuristic
  const hasLocal = localIPs.length > 0;
  const local192 = localIPs.filter(ip => ip.startsWith('192.168.') || ip.startsWith('10.') || ip.startsWith('172.'));
  natType = hasLocal ? (local192.length > 0 ? 'NAT（家用路由器/公司内网）' : '可能是公网IP') : '未知';
  canExpose = publicIP !== '未知' && publicIP !== '无法获取';

  // 4. Connection speed
  let latency = 0;
  try {
    const start = performance.now();
    await fetch('https://api.ipify.org?format=json');
    latency = Math.round(performance.now() - start);
  } catch(e) {}

  // Build results
  const ipOk = canExpose;
  const natOk = !natType.includes('NAT');
  
  let verdictIcon, verdictText, verdictDetail;
  if (ipOk && !natOk) {
    verdictIcon = '⚠️'; verdictText = '你在内网环境中'; verdictDetail = '有公网IP但仍需内网穿透。推荐使用 frp 暴露服务。';
  } else if (ipOk && natOk) {
    verdictIcon = '✅'; verdictText = '你的网络可以直接外网访问'; verdictDetail = '不需要内网穿透。如需反向代理/负载均衡可考虑 frp。';
  } else {
    verdictIcon = '🔒'; verdictText = '你在严格NAT环境中'; verdictDetail = '必须使用内网穿透工具。frp 是最佳选择。';
  }

  document.getElementById('results').innerHTML = `
    <div class="verdict">
      <div class="icon">${verdictIcon}</div>
      <div class="text">${verdictText}</div>
      <div class="detail">${verdictDetail}</div>
    </div>
    <div class="result-grid">
      <div class="result-item">
        <div class="label">🌍 公网IP</div>
        <div class="value ${ipOk?'ok':'warn'}" style="font-size:1rem">${publicIP}</div>
      </div>
      <div class="result-item">
        <div class="label">🏠 网络类型</div>
        <div class="value ${natOk?'ok':'warn'}" style="font-size:.95rem">${natType}</div>
      </div>
      <div class="result-item">
        <div class="label">📡 网络延迟</div>
        <div class="value ${latency<200?'ok':latency<500?'warn':'bad'}">${latency}ms</div>
      </div>
      <div class="result-item">
        <div class="label">🔗 可暴露服务</div>
        <div class="value ${!natOk?'warn':'ok'}">${!natOk?'需要穿透':'可直接访问'}</div>
      </div>
    </div>
    ${localIPs.length ? `<div class="result-item" style="margin-top:12px"><div class="label">💻 本地IP</div><div class="value" style="font-size:.85rem">${localIPs.join(', ')}</div></div>` : ''}
    
    <div class="solution">
      <h4>🚀 推荐方案：frp 内网穿透</h4>
      <div class="step"><span class="step-num">1</span><span class="step-text">准备一台有公网IP的云服务器（阿里云/腾讯云99元/年）</span></div>
      <div class="step"><span class="step-num">2</span><span class="step-text">在服务器上运行 frps（服务端），一行命令搞定</span></div>
      <div class="step"><span class="step-num">3</span><span class="step-text">在本地机器运行 frpc（客户端），配置要暴露的端口</span></div>
      <div class="step"><span class="step-num">4</span><span class="step-text">外网用户通过 服务器IP:端口 访问你的本地服务</span></div>
    </div>
  `;
  
  document.getElementById('results').style.display = 'block';
  document.getElementById('ctaSection').style.display = 'block';
  btn.style.display = 'none';
}
</script>
</body>
</html>
