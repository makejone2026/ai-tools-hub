<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>JSON格式化 | 在线JSON工具</title>
<meta name="description" content="免费在线JSON格式化、压缩、验证工具。纯本地处理。">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;padding:20px}
.container{max-width:900px;margin:0 auto}
h1{font-size:1.8rem;text-align:center;margin:20px 0}
h1 span{background:linear-gradient(135deg,#f59e0b,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:24px;margin-bottom:20px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.btn{padding:10px 20px;border-radius:8px;border:none;font-weight:600;cursor:pointer;font-size:.9rem;transition:.2s}
.btn-primary{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff}
.btn-secondary{background:#334155;color:#e2e8f0}
.btn:hover{filter:brightness(1.2)}
textarea{width:100%;min-height:400px;background:#0f172a;border:1px solid #334155;border-radius:10px;padding:16px;color:#e2e8f0;font-family:'JetBrains Mono',monospace;font-size:.85rem;resize:vertical}
.error{color:#f87171;font-size:.85rem;margin-top:8px;display:none}
.success{color:#4ade80;font-size:.85rem;margin-top:8px;display:none}
.stats{display:flex;gap:16px;color:#64748b;font-size:.8rem;margin-top:8px}
.cta-box{text-align:center;margin-top:20px}
.cta-box form{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:12px}
.cta-box input[type=email]{padding:12px;border-radius:8px;border:1px solid #475569;background:#0f172a;color:#e2e8f0;flex:1;min-width:200px}
</style></head>
<body>
<div class="container">
<h1>{ } JSON <span>格式化工具</span></h1>
<div class="card">
  <div class="toolbar">
    <button class="btn btn-primary" onclick="format()">✨ 格式化</button>
    <button class="btn btn-secondary" onclick="compress()">📦 压缩</button>
    <button class="btn btn-secondary" onclick="validate()">✅ 验证</button>
    <button class="btn btn-secondary" onclick="copy()">📋 复制</button>
    <button class="btn btn-secondary" onclick="clearAll()">🗑 清空</button>
    <button class="btn btn-secondary" onclick="loadSample()">📝 示例</button>
  </div>
  <textarea id="input" placeholder='粘贴JSON到这里...'></textarea>
  <div class="error" id="error"></div>
  <div class="success" id="success"></div>
  <div class="stats">
    <span id="charCount">0 字符</span>
    <span id="lineCount">0 行</span>
    <span id="sizeInfo"></span>
  </div>
</div>
<div class="card cta-box">
  <strong>💼 需要批量JSON处理？</strong>
  <p style="color:#94a3b8;margin:8px 0">API数据清洗、日志格式化、大批量转换 — 留下邮箱获取方案</p>
  <form action="https://formsubmit.co/28960559@qq.com" method="POST">
    <input type="hidden" name="_subject" value="JSON批量处理需求">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_template" value="table">
    <input type="email" name="email" placeholder="your@email.com" required>
    <button class="btn btn-primary" type="submit">获取方案 →</button>
  </form>
</div>
</div>
<script>
const input=document.getElementById('input'),err=document.getElementById('error'),suc=document.getElementById('success');
input.addEventListener('input',updateStats);
function updateStats(){
  const v=input.value;
  document.getElementById('charCount').textContent=v.length.toLocaleString()+' 字符';
  document.getElementById('lineCount').textContent=(v.match(/\n/g)||[]).length+1+' 行';
  document.getElementById('sizeInfo').textContent=(new Blob([v]).size/1024).toFixed(1)+' KB';
}
function format(){
  try{const o=JSON.parse(input.value);input.value=JSON.stringify(o,null,2);err.style.display='none';suc.style.display='block';suc.textContent='✅ 格式化成功'}catch(e){err.style.display='block';err.textContent='❌ '+e.message;suc.style.display='none'}
}
function compress(){try{const o=JSON.parse(input.value);input.value=JSON.stringify(o);err.style.display='none';suc.style.display='block';suc.textContent='✅ 压缩完成'}catch(e){err.style.display='block';err.textContent='❌ '+e.message}}
function validate(){try{JSON.parse(input.value);err.style.display='none';suc.style.display='block';suc.textContent='✅ JSON有效！'}catch(e){err.style.display='block';err.textContent='❌ '+e.message}}
function copy(){navigator.clipboard.writeText(input.value);suc.style.display='block';suc.textContent='✅ 已复制'}
function clearAll(){input.value='';err.style.display='none';suc.style.display='none';updateStats()}
function loadSample(){input.value=JSON.stringify({name:"张三",age:28,skills:["Python","JavaScript"],address:{city:"上海",zip:"200000"}},null,2);updateStats()}
loadSample();
</script></body></html>
