<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>二维码生成器 | 在线QR码工具</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0f172a;color:#e2e8f0;padding:20px}
.container{max-width:600px;margin:0 auto}
h1{font-size:1.8rem;text-align:center;margin:20px 0}
h1 span{background:linear-gradient(135deg,#34d399,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:24px;margin-bottom:20px}
input,textarea{width:100%;padding:12px;border-radius:8px;border:1px solid #475569;background:#0f172a;color:#e2e8f0;font-size:1rem;margin-bottom:12px}
.qr-box{text-align:center;padding:30px;background:#fff;border-radius:12px;margin:16px 0;min-height:200px;display:flex;align-items:center;justify-content:center}
.qr-box img{max-width:256px}
.row{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:12px 24px;border-radius:8px;border:none;font-weight:600;cursor:pointer;font-size:.95rem;flex:1}
.green{background:linear-gradient(135deg,#34d399,#3b82f6);color:#fff}
.gray{background:#334155;color:#e2e8f0}
.cta-box{text-align:center;margin-top:16px}
.cta-box form{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:8px}
.cta-box input[type=email]{padding:10px;border-radius:8px;border:1px solid #475569;background:#0f172a;color:#e2e8f0;flex:1;min-width:180px}
</style></head>
<body>
<div class="container">
<h1>📱 <span>二维码生成器</span></h1>
<div class="card">
  <input type="text" id="text" placeholder="输入网址或文本..." value="https://makejone2026.github.io/ai-tools-hub/">
  <div class="row" style="margin-bottom:12px">
    <label style="color:#94a3b8;display:flex;align-items:center;gap:4px;font-size:.85rem">尺寸</label>
    <select id="size" style="padding:8px;border-radius:8px;border:1px solid #475569;background:#0f172a;color:#e2e8f0">
      <option value="128">128px</option><option value="256" selected>256px</option><option value="512">512px</option><option value="1024">1024px</option>
    </select>
  </div>
  <button class="btn green" onclick="generate()" style="width:100%">🎯 生成二维码</button>
  <div class="qr-box" id="qrBox"><img id="qrImg" alt="QR Code"></div>
  <div class="row">
    <button class="btn gray" onclick="downloadQR()">💾 下载PNG</button>
    <button class="btn gray" onclick="copyQR()">📋 复制图片</button>
  </div>
</div>
<div class="card cta-box">
  <strong>💼 需要批量生成二维码？</strong>
  <p style="color:#94a3b8;margin:6px 0">批量生成、自定义样式、短链接 — 留下邮箱获取方案</p>
  <form action="https://formsubmit.co/28960559@qq.com" method="POST">
    <input type="hidden" name="_subject" value="二维码批量生成需求">
    <input type="hidden" name="_captcha" value="false"><input type="hidden" name="_template" value="table">
    <input type="email" name="email" placeholder="your@email.com" required>
    <button class="btn green" type="submit">获取方案 →</button>
  </form>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script>
function generate(){
  const text=document.getElementById('text').value||'https://example.com';
  const size=parseInt(document.getElementById('size').value);
  const canvas=document.createElement('canvas');
  QRCode.toCanvas(canvas,text,{width:size,margin:2},err=>{if(err)alert('生成失败');});
  canvas.style.maxWidth='100%';canvas.style.height='auto';
  const box=document.getElementById('qrBox');box.innerHTML='';box.appendChild(canvas);
}
function downloadQR(){
  const canvas=document.querySelector('#qrBox canvas');
  if(!canvas)return;
  const a=document.createElement('a');a.href=canvas.toDataURL();a.download='qrcode.png';a.click();
}
async function copyQR(){
  const canvas=document.querySelector('#qrBox canvas');
  if(!canvas)return;
  const blob=await new Promise(r=>canvas.toBlob(r));
  await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
  alert('✅ 二维码已复制到剪贴板');
}
generate();
</script>
<script charset="UTF-8" id="LA_COLLECT" src="//sdk.51.la/js-sdk-pro.min.js"></script>

</body></html>
