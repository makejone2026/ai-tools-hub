<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Markdown预览 | 在线编辑器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;padding:20px}
.container{max-width:1400px;margin:0 auto}
h1{font-size:1.8rem;text-align:center;margin:20px 0}
h1 span{background:linear-gradient(135deg,#a78bfa,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.split{display:grid;grid-template-columns:1fr 1fr;gap:20px;min-height:70vh}
@media(max-width:768px){.split{grid-template-columns:1fr}}
.card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:20px;overflow:auto}
.card h3{color:#94a3b8;margin-bottom:12px;font-size:.9rem}
textarea{width:100%;height:100%;min-height:400px;background:transparent;border:none;color:#e2e8f0;font-family:'JetBrains Mono',monospace;font-size:.9rem;resize:none;outline:none}
.preview{padding:20px;line-height:1.8;overflow:auto;max-height:70vh}
.preview h1,.preview h2,.preview h3{color:#38bdf8;margin:16px 0 8px}
.preview code{background:#334155;padding:2px 6px;border-radius:4px;font-size:.85rem}
.preview pre{background:#0f172a;padding:16px;border-radius:8px;overflow-x:auto;margin:12px 0}
.preview pre code{background:none;padding:0}
.preview a{color:#a78bfa}
.preview blockquote{border-left:3px solid #a78bfa;padding-left:16px;color:#94a3b8;margin:12px 0}
.preview table{border-collapse:collapse;width:100%;margin:12px 0}
.preview td,.preview th{border:1px solid #334155;padding:8px 12px;text-align:left}
.preview th{background:#0f172a}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:.85rem;font-weight:600;background:#334155;color:#e2e8f0}
.btn:hover{background:#475569}
.cta-box{text-align:center;margin-top:20px}
.cta-box form{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:8px}
.cta-box input[type=email]{padding:10px;border-radius:8px;border:1px solid #475569;background:#0f172a;color:#e2e8f0;flex:1;min-width:200px}
.btn-cta{background:linear-gradient(135deg,#a78bfa,#38bdf8);color:#fff}
</style></head>
<body>
<div class="container">
<h1>📝 Markdown <span>实时预览</span></h1>
<div class="toolbar">
  <button class="btn" onclick="insertBold()">**粗体**</button>
  <button class="btn" onclick="insertItalic()">*斜体*</button>
  <button class="btn" onclick="insertH2()">## 标题</button>
  <button class="btn" onclick="insertLink()">[链接]</button>
  <button class="btn" onclick="insertCode()">代码块</button>
  <button class="btn" onclick="insertTable()">表格</button>
  <button class="btn" onclick="loadSample()">📝 示例</button>
  <button class="btn" onclick="copyMd()">📋 复制</button>
  <button class="btn" onclick="downloadMd()">💾 下载.md</button>
</div>
<div class="split">
  <div class="card">
    <h3>✏️ 编辑</h3>
    <textarea id="editor" oninput="renderMd()"># 欢迎使用 Markdown 编辑器

这是一款**实时预览**的 Markdown 编辑器。

## 功能特点

- 🔥 实时渲染
- 📋 一键复制
- 💾 下载 .md 文件
- ⌨️ 快捷插入工具栏

### 代码示例

```python
def hello():
    print("Hello, Markdown!")
```

### 表格

| 项目 | 状态 |
|------|------|
| 编辑器 | ✅ |
| 预览 | ✅ |

> Markdown 是一种轻量级标记语言，由 John Gruber 创建。
</textarea>
  </div>
  <div class="card">
    <h3>👁️ 预览</h3>
    <div class="preview" id="preview"></div>
  </div>
</div>
<div class="card cta-box">
  <strong>💼 需要批量Markdown处理？</strong>
  <p style="color:#94a3b8;margin:6px 0">文档批量转换、格式化、模板定制 — 留下邮箱获取方案</p>
  <form action="https://formsubmit.co/28960559@qq.com" method="POST">
    <input type="hidden" name="_subject" value="Markdown批量处理需求">
    <input type="hidden" name="_captcha" value="false"><input type="hidden" name="_template" value="table">
    <input type="email" name="email" placeholder="your@email.com" required>
    <button class="btn btn-cta" type="submit">获取方案 →</button>
  </form>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js"></script>
<script>
const editor=document.getElementById('editor');
function renderMd(){document.getElementById('preview').innerHTML=marked.parse(editor.value,{breaks:true,gfm:true})}
function insertBold(){wrap('**')}function insertItalic(){wrap('*')}function insertH2(){insertAtStart('## ')}
function insertLink(){wrap('[','](url)')}function insertCode(){wrap('\n```\n','\n```\n')}
function insertTable(){editor.value+='\n| 列1 | 列2 |\n|-----|-----|\n| A | B |\n'}
function loadSample(){editor.value=`# 你的标题\n\n开始写 Markdown...\n\n- 列表项1\n- 列表项2\n\n> 引用文字`;renderMd()}
function wrap(before,after){const s=editor.selectionStart,e=editor.selectionEnd,t=editor.value;const a=after||before;editor.value=t.slice(0,s)+before+t.slice(s,e)+a+t.slice(e);editor.focus();editor.selectionStart=s+before.length;editor.selectionEnd=e+before.length;renderMd()}
function insertAtStart(prefix){const s=editor.selectionStart;const t=editor.value;const ls=t.lastIndexOf('\n',s-1);editor.value=t.slice(0,ls+1)+prefix+t.slice(ls+1);editor.focus();renderMd()}
function copyMd(){navigator.clipboard.writeText(editor.value);alert('✅ 已复制')}
function downloadMd(){const b=new Blob([editor.value],{type:'text/markdown'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='document.md';a.click()}
renderMd();
</script></body></html>
